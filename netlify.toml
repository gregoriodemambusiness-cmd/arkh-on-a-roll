[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NOTION_TOKEN,STRIPE_SECRET_KEY_TEST,STRIPE_PUBLISHABLE_KEY_TEST,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"
  SECRETS_SCAN_OMIT_PATHS = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
